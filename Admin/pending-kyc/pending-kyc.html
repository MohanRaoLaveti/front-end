<section class="pending-kyc">
  <h2>Pending KYC Customers</h2>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  <p class="status-message" *ngIf="statusMessage">{{ statusMessage }}</p>

  <table class="kyc-table" *ngIf="pendingProfiles.length > 0">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Country</th>
        <th>Pincode</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let profile of pendingProfiles">
        <td>{{ profile.fullName }}</td>
        <td>{{ profile.email }}</td>
        <td>{{ profile.phone }}</td>
        <td>{{ profile.country }}</td>
        <td>{{ profile.pincode }}</td>
        <td>
<button (click)="approveKyc(profile.id)">Approve</button>
        </td>
      </tr>
    </tbody>
  </table>
</section>
